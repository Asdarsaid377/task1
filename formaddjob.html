<!doctype html>

<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>Post New Job - JobSync</title>
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
			rel="stylesheet" />
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							primary: "#003366",
							"background-light": "#f5f7f8",
							"background-dark": "#0f1923",
						},
						fontFamily: {
							display: ["Inter"],
						},
						borderRadius: {
							DEFAULT: "0.25rem",
							lg: "0.5rem",
							xl: "0.75rem",
							full: "9999px",
						},
					},
				},
			};
		</script>
	</head>
	<body
		class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
		<div class="relative flex h-screen w-full flex-col overflow-hidden">
			<!-- Top Navigation -->
			<header
				class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-8 py-3 z-10">
				<div class="flex items-center gap-4">
					<div class="text-primary">
						<span class="material-symbols-outlined text-3xl"
							>rocket_launch</span
						>
					</div>
					<h2 class="text-xl font-bold leading-tight tracking-tight">
						JobSync
					</h2>
				</div>
				<div class="flex items-center gap-6">
					<div class="flex gap-2">
						<button
							class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-colors">
							<span
								class="material-symbols-outlined text-slate-600 dark:text-slate-400"
								>notifications</span
							>
						</button>
						<button
							class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-colors">
							<span
								class="material-symbols-outlined text-slate-600 dark:text-slate-400"
								>help</span
							>
						</button>
					</div>
					<div
						class="h-10 w-10 rounded-full bg-slate-200 dark:bg-slate-700 bg-cover bg-center"
						data-alt="Employer profile avatar"
						style="
							background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuDZ-2mFyBTXuy1MWcXi__LEUW6sbjwIjKyp06Pl9qeVBehNJYoNiZl6cfmiVrIpO2fLLvKT83nLcarXQ2Pe4qoiVW1mUj8B0Aq0pE2kx-52asY-6nMXSdnWd5C0F5LVzG4OHj8T-KLM3ghnCbyA7v8ftZrrhnGertakkq1EQPXCQOpCQXVrrCtldc78yhsn5gvKCGR7CBEAAKSN_kOuBzVfhi53DBX-RTYgMs7LSjdl48B6br8KI_oxRiBWp927PDgD0gClRKYlQUM&quot;);
						"></div>
				</div>
			</header>
			<div class="flex flex-1 overflow-hidden">
				<!-- Sidebar Navigation -->
				<aside
					class="w-64 flex-shrink-0 flex flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-4">
					<div class="flex flex-col gap-6">
						<div class="flex items-center gap-3 px-2">
							<div
								class="h-10 w-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
								<span class="material-symbols-outlined">business</span>
							</div>
							<div class="flex flex-col">
								<p class="text-sm font-bold">TechFlow Inc.</p>
								<p class="text-xs text-slate-500">Employer Portal</p>
							</div>
						</div>
						<nav class="flex flex-col gap-1">
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
								href="#">
								<span class="material-symbols-outlined">dashboard</span>
								<span class="text-sm font-medium">Dashboard</span>
							</a>
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary text-white"
								href="#">
								<span class="material-symbols-outlined">add_circle</span>
								<span class="text-sm font-medium">Post New Job</span>
							</a>
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
								href="#">
								<span class="material-symbols-outlined">work</span>
								<span class="text-sm font-medium">Manage Jobs</span>
							</a>
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
								href="#">
								<span class="material-symbols-outlined">group</span>
								<span class="text-sm font-medium">Candidates</span>
							</a>
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
								href="#">
								<span class="material-symbols-outlined">chat</span>
								<span class="text-sm font-medium">Messages</span>
							</a>
							<hr class="my-2 border-slate-200 dark:border-slate-800" />
							<a
								class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
								href="#">
								<span class="material-symbols-outlined">settings</span>
								<span class="text-sm font-medium">Settings</span>
							</a>
						</nav>
					</div>
				</aside>
				<!-- Main Content Area -->
				<main
					class="flex-1 overflow-y-auto p-8 bg-background-light dark:bg-background-dark">
					<div class="max-w-4xl mx-auto">
						<div class="mb-8">
							<h1
								class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">
								Post New Job
							</h1>
							<p class="text-slate-500 dark:text-slate-400 mt-2">
								Fill in the details below to find your next great hire.
							</p>
						</div>
						<form class="space-y-6">
							<!-- Card: Basic Information -->
							<div
								class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
								<h3 class="text-lg font-bold mb-6 text-primary">
									Basic Information
								</h3>
								<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
									<div class="col-span-full">
										<label
											class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
											>Job Title</label
										>
										<input
											class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3"
											placeholder="e.g. Senior Full Stack Engineer"
											type="text" />
									</div>
									<div>
										<label
											class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
											>Category</label
										>
										<select
											class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3">
											<option>Engineering</option>
											<option>Design</option>
											<option>Marketing</option>
											<option>Product Management</option>
											<option>Sales</option>
										</select>
									</div>
									<div>
										<label
											class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
											>Location</label
										>
										<div class="flex gap-4">
											<label
												class="flex-1 flex items-center justify-center border-2 border-primary rounded-lg p-3 cursor-pointer bg-primary/5">
												<input
													checked=""
													class="hidden"
													name="location"
													type="radio" />
												<span
													class="flex items-center gap-2 text-sm font-semibold text-primary">
													<span class="material-symbols-outlined text-lg"
														>public</span
													>
													Remote
												</span>
											</label>
											<label
												class="flex-1 flex items-center justify-center border-2 border-slate-200 dark:border-slate-700 rounded-lg p-3 cursor-pointer hover:border-slate-300">
												<input class="hidden" name="location" type="radio" />
												<span
													class="flex items-center gap-2 text-sm font-semibold text-slate-600 dark:text-slate-400">
													<span class="material-symbols-outlined text-lg"
														>location_on</span
													>
													On-site
												</span>
											</label>
										</div>
									</div>
									<div>
										<label
											class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
											>Employment Type</label
										>
										<select
											class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary px-4 py-3">
											<option>Full-time</option>
											<option>Part-time</option>
											<option>Contract</option>
											<option>Freelance</option>
											<option>Internship</option>
										</select>
									</div>
									<div>
										<label
											class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
											>Salary Range (Annual)</label
										>
										<div class="flex items-center gap-2">
											<div class="relative flex-1">
												<span
													class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
													>$</span
												>
												<input
													class="w-full pl-8 rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary py-3"
													placeholder="Min"
													type="text" />
											</div>
											<span class="text-slate-400">—</span>
											<div class="relative flex-1">
												<span
													class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
													>$</span
												>
												<input
													class="w-full pl-8 rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-primary focus:border-primary py-3"
													placeholder="Max"
													type="text" />
											</div>
										</div>
									</div>
								</div>
							</div>
							<!-- Card: Job Description -->
							<div
								class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-6">
								<h3 class="text-lg font-bold mb-6 text-primary">
									Job Description
								</h3>
								<div
									class="border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
									<!-- Rich Text Toolbar Mockup -->
									<div
										class="bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 p-2 flex gap-2">
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>format_bold</span
											>
										</button>
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>format_italic</span
											>
										</button>
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>format_list_bulleted</span
											>
										</button>
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>format_list_numbered</span
											>
										</button>
										<div
											class="w-px h-6 bg-slate-300 dark:bg-slate-600 mx-1 self-center"></div>
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>link</span
											>
										</button>
										<button
											class="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded"
											type="button">
											<span class="material-symbols-outlined text-xl"
												>image</span
											>
										</button>
									</div>
									<textarea
										class="w-full p-4 min-h-[300px] dark:bg-slate-900 border-none focus:ring-0 placeholder:text-slate-400"
										placeholder="Describe the role, responsibilities, and requirements..."></textarea>
								</div>
							</div>
							<!-- Actions -->
							<div class="flex items-center justify-end gap-4 py-4">
								<button
									class="px-6 py-3 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
									type="button">
									Save Draft
								</button>
								<button
									class="px-10 py-3 rounded-lg bg-primary text-white text-sm font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all"
									type="submit">
									Publish Job Listing
								</button>
							</div>
						</form>
					</div>
				</main>
			</div>
		</div>
	</body>
</html>
